

server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agms_automation_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Logging Configuration
logging:
  level:
    root: INFO
    lk.ijse.gdse.automationservice: DEBUG
    org.springframework.cloud: DEBUG
  file:
    name: logs/automation-service.log
    max-size: 10MB
    max-history: 10

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
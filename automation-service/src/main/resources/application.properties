spring.application.name=automation-service

server:
port: 8083

spring:
application:
name: automation-service
config:
import: optional:configserver:http://localhost:8888
datasource:
url: jdbc:mysql://localhost:3306/agms_automation_db
username: root
password: password
driver-class-name: com.mysql.cj.jdbc.Driver
jpa:
hibernate:
ddl-auto: update
properties:
hibernate:
dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
client:
service-url:
defaultZone: http://localhost:8761/eureka/
instance:
prefer-ip-address: true

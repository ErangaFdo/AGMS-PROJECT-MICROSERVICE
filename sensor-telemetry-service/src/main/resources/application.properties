spring.application.name=sensor-telemetry-service

server:
port: 8083

spring:
application:
name: sensor-telemetry-service

datasource:
url: jdbc:h2:mem:sensor_telemetry_db
driverClassName: org.h2.Driver
username: sa
password:

jpa:
database-platform: org.hibernate.dialect.H2Dialect
hibernate:
ddl-auto: create-drop
show-sql: false

eureka:
client:
serviceUrl:
defaultZone: http://localhost:8761/eureka/
register-with-eureka: true
fetch-registry: true

instance:
hostname: localhost
instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
endpoints:
web:
exposure:
include: health,info,metrics
endpoint:
health:
show-details: always
